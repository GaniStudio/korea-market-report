<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Korea Market Report Share</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#05070b;color:#f6f8fb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",Arial,sans-serif;line-height:1.6}
    main{max-width:720px;margin:0 auto;padding:22px 16px 48px}
    .hero,.card{border:1px solid rgba(255,255,255,.12);border-radius:8px;background:#0d1118}
    .hero{padding:22px 18px;border-top:5px solid #f2c14e;background:#0b111a}
    .kicker{margin:0 0 6px;color:#f2c14e;font-size:12px;font-weight:900}
    h1{margin:0;font-size:25px;line-height:1.25}
    p{margin:10px 0 0;color:#a8b0bd}
    .grid{display:grid;gap:14px;margin-top:14px}
    .card{padding:16px}
    h2{margin:0 0 10px;font-size:19px}
    a{display:block;margin-top:9px;padding:12px 13px;border-radius:8px;background:#121a25;border:1px solid rgba(255,255,255,.12);color:#f6f8fb;text-decoration:none;font-weight:850}
    a:hover{border-color:rgba(242,193,78,.55)}
    .primary{color:#6ee7b7}
    .pdf{color:#f2c14e}
    .note{margin-top:14px;padding:12px;border:1px solid rgba(242,193,78,.3);border-radius:8px;background:rgba(242,193,78,.08);color:#f5e6b8;font-size:13px}
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <p class="kicker">KOREA FIRST · REPORT SHARE</p>
      <h1>2026-05-26 한국 시장 리포트</h1>
      <p>폰에서는 모바일 HTML을 먼저 보고, PDF는 보관/첨부용으로 사용합니다.</p>
    </section>

    <section class="grid">
      <article class="card">
        <h2>모바일 HTML</h2>
        <a class="primary" href="./morning.html">오전 리포트 모바일 보기</a>
        <a class="primary" href="./weekly.html">주간 리포트 모바일 보기</a>
      </article>

      <article class="card">
        <h2>PDF</h2>
        <a class="pdf" href="./pdf/morning.pdf">오전 리포트 PDF 열기</a>
        <a class="pdf" href="./pdf/weekly.pdf">주간 리포트 PDF 열기</a>
      </article>
    </section>

    <div class="note">공유용 폴더에는 모바일 HTML과 PDF만 포함합니다. 내부 source log, validation, PM 문서는 올리지 않습니다.</div>
  </main>
</body>
</html>
